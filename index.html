<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      
      <!-- 1. Assets: Load all models here -->
      <a-assets>
        <a-asset-item id="helmetModel" src="models/DamagedHelmet.glb"></a-asset-item>
        <a-asset-item id="foxModel" src="models/Fox.glb"></a-asset-item>
      </a-assets>

      <a-marker type='pattern' url='armarker/DanagedHelmet_marker.patt'>
        <a-entity 
          gltf-model="#helmetModel" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <!-- <a-marker type='pattern' url='armarker/Fox_marker.patt'>
        <a-entity 
          gltf-model="#foxModel" 
          scale="1 1 1" 
          position="0 0.5 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker> -->

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
