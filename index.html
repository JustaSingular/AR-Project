  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      
      <a-assets>
        <a-asset-item id="helmetModel" src="models/DamagedHelmet.glb"></a-asset-item>
        <a-asset-item id="duckModel" src="models/Duck.glb"></a-asset-item>
        <a-asset-item id="myersModel" src="models/michael_myers.glb"></a-asset-item>
        <a-asset-item id="bouquetModel" src="models/bouquet.glb"></a-asset-item>
        <a-asset-item id="sydbdModel" src="models/sydbd.glb"></a-asset-item>
        <a-asset-item id="newBDModel" src="models/newbirthday.glb"></a-asset-item>
        <a-asset-item id="FinalBD" src="models/birthday.glb"></a-asset-item>
        <a-asset-item id="NinaTV" src="models/Nina_tv - Copy.glb"></a-asset-item>
        <a-asset-item id="jar" src="models/jar.glb"></a-asset-item>
        <a-asset-item id="jasbd" src="models/jasbd.glb"></a-asset-item>
        <a-asset-item id="liz" src="models/lizard2.glb"></a-asset-item>
        <a-asset-item id="fatima" src="models/fatima.glb"></a-asset-item>
      </a-assets>

      <a-marker type='pattern' url='armarker/patternkanji.patt'>
        <a-entity 
          gltf-model="#FinalBD" 
          scale="1 1 1" 
          position="0 0 0"
          rotation="0 -90 0"
          animation-mixer>
        </a-entity>
      </a-marker>

      <a-marker type='pattern' url='armarker/wmarker.patt'>
        <a-entity 
          gltf-model="#fatima" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker type='pattern' url='armarker/patternhiro.patt'>
        <a-entity 
          gltf-model="#jasbd" 
          scale="1 1 1" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker type='pattern' url='armarker/patternletterA.patt'>
        <a-entity 
          gltf-model="#helmetModel" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker type='pattern' url='armarker/patternarjs.patt'>
        <a-entity 
          gltf-model="#duckModel" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
