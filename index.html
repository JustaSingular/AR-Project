<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.7.0/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false;'>
      
      <!-- 1. Assets: Load all models here -->
      <a-assets>
        <a-asset-item id="helmetModel" src="models/DamagedHelmet.glb"></a-asset-item>
        <a-asset-item id="duckModel" src="models/Duck.glb"></a-asset-item>
        <a-asset-item id="myersModel" src="models/michael_myers.glb"></a-asset-item>
        <a-asset-item id="bouquetModel" src="models/bouquet.glb"></a-asset-item>
        <a-asset-item id="sydbdModel" src="models/sydbd.glb"></a-asset-item>
        <a-asset-item id="newBDModel" src="models/newbirthday.glb"></a-asset-item>
        <a-asset-item id="FinalBD" src="models/birthdayFinal.glb"></a-asset-item>
      </a-assets>

      <a-marker type='pattern' url='armarker/wmarker.patt'>
        <a-entity 
          gltf-model="#FinalBD" 
          scale="1 1 1" 
          position="0 0 0"
          rotation="0 -90 0"
          animation-mixer>
        </a-entity>
      </a-marker>

      <!-- <a-marker type='pattern' url='armarker/wmarker.patt'>
        <a-entity 
          gltf-model="#newBDModel" 
          scale="1 1 1" 
          position="0 0 0"
          rotation="0 -90 0"
          animation-mixer>
        </a-entity>
      </a-marker> -->

      <a-marker type='pattern' url='armarker/patternhiro.patt'>
        <a-entity 
          gltf-model="#myersModel" 
          scale="2 2 2" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>

      <a-marker type='pattern' url='armarker/patternkanji.patt'>
        <a-entity 
          gltf-model="#duckModel" 
          scale="0.5 0.5 0.5" 
          position="0 0 0"
          rotation="0 0 0">
        </a-entity>
      </a-marker>


      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
